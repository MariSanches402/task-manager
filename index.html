<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager | Gerenciador de Tarefas</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <div class="container">

    <!-- HEADER -->
    <header class="header">
      <div class="header-title">
        <i class="fas fa-check-circle"></i>
        <h1>Task Manager</h1>
      </div>
      <p class="header-sub">Organize suas tarefas com eficiência</p>
    </header>

    <!-- FORMULÁRIO DE ADIÇÃO -->
    <section class="form-section">
      <div class="input-group">
        <input
          type="text"
          id="taskInput"
          placeholder="Digite uma nova tarefa..."
          maxlength="80"
        />
        <select id="prioritySelect">
          <option value="alta">🔴 Alta</option>
          <option value="media" selected>🟡 Média</option>
          <option value="baixa">🟢 Baixa</option>
        </select>
        <button id="addBtn" onclick="addTask()">
          <i class="fas fa-plus"></i> Adicionar
        </button>
      </div>
    </section>

    <!-- FILTROS E CONTADORES -->
    <section class="stats-section">
      <div class="stats">
        <span class="stat-badge total">Total: <strong id="totalCount">0</strong></span>
        <span class="stat-badge pending">Pendentes: <strong id="pendingCount">0</strong></span>
        <span class="stat-badge done">Concluídas: <strong id="doneCount">0</strong></span>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="filterTasks('all', this)">Todas</button>
        <button class="filter-btn" onclick="filterTasks('pending', this)">Pendentes</button>
        <button class="filter-btn" onclick="filterTasks('done', this)">Concluídas</button>
      </div>
    </section>

    <!-- LISTA DE TAREFAS -->
    <section class="task-section">
      <ul id="taskList"></ul>
      <div id="emptyState" class="empty-state">
        <i class="fas fa-clipboard-list"></i>
        <p>Nenhuma tarefa encontrada.<br/>Adicione uma acima! 👆</p>
      </div>
    </section>

    <!-- BOTÃO LIMPAR CONCLUÍDAS -->
    <div class="actions-footer">
      <button class="clear-btn" onclick="clearCompleted()">
        <i class="fas fa-trash-alt"></i> Limpar Concluídas
      </button>
    </div>

    <!-- RODAPÉ -->
    <footer class="footer">
      <p>Desenvolvido por <strong>Seu Nome</strong> | ADS - 2025</p>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
